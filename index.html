<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OFFLINE | Mascot Horror Prototype</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Courier+Prime:wght@400;700&display=swap');

        :root {
            --blood: #660000;
            --bright-red: #ff0000;
            --bg: #030303;
            --gray: #1a1a1a;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg);
            color: #eee;
            font-family: 'Special Elite', serif;
            overflow: hidden;
        }

        /* --- FILTROS DE TELA (VHS/CRT) --- */
        .overlay {
            position: fixed; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 2px 100%;
            z-index: 1000; pointer-events: none;
        }

        .vignette {
            position: fixed; inset: 0;
            background: radial-gradient(circle, transparent 30%, black 140%);
            z-index: 1001; pointer-events: none;
        }

        /* --- SISTEMA DE TELAS --- */
        .screen {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 50px;
            transition: transform 0.4s ease-in-out, opacity 0.3s;
        }

        .hidden { 
            opacity: 0; 
            pointer-events: none; 
            transform: scale(0.95);
        }

        /* --- TELA DE TÍTULO --- */
        .glitch-title {
            font-size: 9rem;
            letter-spacing: 25px;
            color: #fff;
            text-shadow: 4px 4px var(--blood);
            margin: 0;
            animation: flicker 4s infinite;
        }

        .menu-options {
            margin-top: 50px;
            display: flex; flex-direction: column; gap: 20px;
        }

        .btn-menu {
            background: none; border: none;
            color: #444; font-family: 'Courier Prime', monospace;
            font-size: 1.8rem; cursor: pointer;
            text-transform: uppercase; transition: 0.2s;
        }

        .btn-menu:hover { color: #fff; text-shadow: 0 0 10px #fff; transform: translateX(10px); }

        /* --- TELA DE SELEÇÃO (5 CAPÍTULOS) --- */
        .chapter-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            width: 90%;
            margin-top: 40px;
        }

        .ch-card {
            background: var(--gray);
            border: 1px solid #333;
            height: 300px;
            display: flex; flex-direction: column;
            cursor: pointer; transition: 0.3s;
            position: relative;
        }

        .ch-card:hover { 
            border-color: var(--bright-red); 
            transform: translateY(-5px);
            box-shadow: 0 0 15px rgba(255,0,0,0.2);
        }

        .ch-thumb {
            width: 100%; height: 60%;
            background: #000;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.7rem; color: #222;
        }

        .ch-info { padding: 15px; text-align: center; }
        .ch-name { font-size: 1rem; display: block; margin-bottom: 5px; }
        .ch-status { font-size: 0.7rem; font-family: 'Courier Prime'; color: var(--blood); }

        /* --- TELA DE BRIEFING (DESCRIÇÃO) --- */
        .briefing-layout {
            display: flex; gap: 50px;
            max-width: 1000px; width: 100%;
            background: rgba(10,10,10,0.8);
            padding: 40px; border: 1px solid #222;
        }

        .briefing-img {
            width: 400px; height: 500px;
            background: #000; border: 1px solid #333;
        }

        .briefing-text {
            flex: 1; display: flex; flex-direction: column;
            justify-content: space-between;
        }

        .briefing-title { font-size: 3rem; color: var(--bright-red); margin: 0; }
        .briefing-desc { font-family: 'Courier Prime'; line-height: 1.6; color: #888; margin-top: 20px; }

        .btn-play {
            background: var(--blood); color: #fff;
            border: 1px solid var(--bright-red);
            padding: 20px; font-size: 2rem;
            font-family: 'Special Elite'; cursor: pointer;
            transition: 0.3s;
        }

        .btn-play:hover { background: var(--bright-red); box-shadow: 0 0 30px var(--bright-red); }

        /* --- ANIMAÇÕES --- */
        @keyframes flicker {
            0% { opacity: 1; }
            5% { opacity: 0.4; transform: translateX(-2px); }
            10% { opacity: 1; }
            100% { opacity: 1; }
        }

        .back-link {
            position: absolute; top: 40px; left: 40px;
            color: #444; cursor: pointer; font-family: 'Courier Prime';
        }
    </style>
</head>
<body>

    <div class="overlay"></div>
    <div class="vignette"></div>

    <section id="screen-title" class="screen">
        <h1 class="glitch-title">OFFLINE</h1>
        <div class="menu-options">
            <button class="btn-menu" onclick="nav('screen-chapters')">Acessar Arquivos</button>
            <button class="btn-menu">Configurações</button>
            <button class="btn-menu">Sair</button>
        </div>
    </section>

    <section id="screen-chapters" class="screen hidden">
        <div class="back-link" onclick="nav('screen-title')">< VOLTAR_AO_MENU</div>
        <h2 style="font-size: 3rem; letter-spacing: 10px;">SELECIONE O SETOR</h2>
        
        <div class="chapter-grid">
            <div class="ch-card" onclick="openBriefing(1)">
                <div class="ch-thumb">IMG_SEC_01</div>
                <div class="ch-info">
                    <span class="ch-name">01: O Início</span>
                    <span class="ch-status">DISPONÍVEL</span>
                </div>
            </div>
            <div class="ch-card" onclick="openBriefing(2)">
                <div class="ch-thumb">IMG_SEC_02</div>
                <div class="ch-info">
                    <span class="ch-name">02: Manutenção</span>
                    <span class="ch-status">DISPONÍVEL</span>
                </div>
            </div>
            <div class="ch-card" onclick="openBriefing(3)">
                <div class="ch-thumb">IMG_SEC_03</div>
                <div class="ch-info">
                    <span class="ch-name">03: Central</span>
                    <span class="ch-status">RESTRICTED</span>
                </div>
            </div>
            <div class="ch-card" onclick="openBriefing(4)">
                <div class="ch-thumb">IMG_SEC_04</div>
                <div class="ch-info">
                    <span class="ch-name">04: Laboratório</span>
                    <span class="ch-status">RESTRICTED</span>
                </div>
            </div>
            <div class="ch-card" onclick="openBriefing(5)">
                <div class="ch-thumb">IMG_SEC_05</div>
                <div class="ch-info">
                    <span class="ch-name">05: Protocolo Z</span>
                    <span class="ch-status">CORRUPTED</span>
                </div>
            </div>
        </div>
    </section>

    <section id="screen-briefing" class="screen hidden">
        <div class="back-link" onclick="nav('screen-chapters')">< RETORNAR_AOS_ARQUIVOS</div>
        
        <div class="briefing-layout">
            <div class="briefing-img" id="b-img">
                </div>
            <div class="briefing-text">
                <div>
                    <h2 id="b-title" class="briefing-title">CAPÍTULO_NAME</h2>
                    <p id="b-desc" class="briefing-desc">Descrição...</p>
                </div>
                <button class="btn-play" onclick="startLoading()">INICIAR CONEXÃO</button>
            </div>
        </div>
    </section>

    <script>
        // Dados dos 5 Capítulos
        const chapters = {
            1: {
                title: "O DESPERTAR",
                desc: "Você acorda em uma sala de monitoramento vazia. A única coisa que se ouve é o chiado de uma TV velha. Encontre a saída antes que a porta se tranque para sempre.",
                color: "#1aff1a"
            },
            2: {
                title: "TUBULAÇÕES",
                desc: "O sistema de ventilação está emitindo sons humanos. Algo metálico está arrastando nos canos acima de você. Não olhe para cima.",
                color: "#ffff00"
            },
            3: {
                title: "CENTRAL DE DADOS",
                desc: "Milhares de telas, mas nenhuma mostra a realidade. O 'Administrador' sabe que você está aqui. Hackeie o terminal central sem ser visto.",
                color: "#ff0000"
            },
            4: {
                title: "LABORATÓRIO BIO",
                desc: "Eles estavam tentando digitalizar a consciência. O resultado não tem rosto, mas tem fome. O oxigênio está acabando.",
                color: "#ff0000"
            },
            5: {
                title: "PROTOCOLO: OFFLINE",
                desc: "A última barreira entre o mundo real e o vazio digital. Se você morrer aqui, sua conexão será cortada permanentemente. Adeus.",
                color: "#ff0000"
            }
        };

        function nav(id) {
            // Efeito de flash na transição
            document.body.style.filter = "invert(1)";
            setTimeout(() => {
                document.body.style.filter = "none";
                document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
                document.getElementById(id).classList.remove('hidden');
            }, 100);
        }

        function openBriefing(num) {
            const data = chapters[num];
            document.getElementById('b-title').innerText = data.title;
            document.getElementById('b-desc').innerText = data.desc;
            document.getElementById('b-img').style.backgroundColor = num % 2 === 0 ? "#111" : "#080808";
            
            nav('screen-briefing');
        }

        function startLoading() {
            alert("AVISO: Tentativa de conexão detectada. Carregando ambiente virtual...");
        }
    </script>
</body>
</html>

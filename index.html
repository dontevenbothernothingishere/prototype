<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OFFLINE | Game Interface</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Inter:wght@300;700&family=Courier+Prime&display=swap');

        :root {
            --blood: #880000;
            --bright-red: #ff0000;
            --bg: #030303;
            --gray: #121212;
            --white: #ffffff;
            --scanline-color: rgba(255, 255, 255, 0.03);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg);
            color: #eee;
            font-family: 'Special Elite', serif;
            overflow: hidden;
        }

        /* --- FILTROS DE ATMOSFERA --- */
        .crt-lines {
            position: fixed; inset: 0;
            background: linear-gradient(var(--scanline-color) 50%, transparent 50%);
            background-size: 100% 4px;
            z-index: 1000; pointer-events: none;
        }

        .vignette {
            position: fixed; inset: 0;
            background: radial-gradient(circle, transparent 20%, black 140%);
            z-index: 1001; pointer-events: none;
        }

        /* --- SISTEMA DE TELAS --- */
        .screen {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 50px;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .hidden { 
            opacity: 0; 
            pointer-events: none; 
            transform: scale(1.02);
        }

        /* --- TELA DE TÍTULO --- */
        .glitch-title {
            font-size: 8rem;
            letter-spacing: 25px;
            color: #fff;
            margin: 0;
            animation: flicker 5s infinite;
            text-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        .menu-options {
            margin-top: 60px;
            display: flex; flex-direction: column; gap: 20px;
        }

        .btn-menu {
            background: none; border: none;
            color: #666; font-family: 'Inter', sans-serif;
            font-size: 1.2rem; cursor: pointer;
            text-transform: uppercase; transition: 0.3s;
            text-align: center;
            letter-spacing: 6px;
            font-weight: 300;
        }

        .btn-menu:hover { 
            color: #fff; 
            letter-spacing: 10px;
        }

        /* --- TELA DE SELEÇÃO DE CAPÍTULOS --- */
        .chapter-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 25px;
            width: 90%;
            margin-top: 50px;
        }

        .ch-card {
            background: #000;
            border: 1px solid #1a1a1a;
            height: 380px;
            cursor: pointer; transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            overflow: hidden;
            position: relative;
        }

        .ch-card:not(.locked):hover { 
            border-color: #fff;
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .ch-img-preview {
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0.5;
            transition: 0.6s;
            filter: saturate(0.5);
        }

        .ch-card:not(.locked):hover .ch-img-preview { 
            opacity: 1; 
            filter: saturate(1);
        }

        .ch-card.locked {
            cursor: not-allowed;
            background: #050505;
        }

        .lock-svg {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 40px; fill: #222;
        }

        .ch-label {
            position: absolute; bottom: 0; width: 100%;
            padding: 30px 0;
            text-align: center;
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 4px;
            color: #444;
            background: linear-gradient(transparent, #000);
        }

        .ch-card:not(.locked) .ch-label { color: #fff; }

        /* --- NOVO DESIGN: TELA DE INFO (CINEMÁTICO MODERNO) --- */
        #screen-briefing {
            padding: 0;
            background: #000;
        }

        /* Fundo desfocado com a imagem do capítulo */
        .b-background-blur {
            position: absolute;
            inset: 0;
            z-index: 1;
        }

        .b-bg-img-blur {
            width: 100%; height: 100%;
            object-fit: cover;
            filter: blur(20px) brightness(0.2) saturate(0.5);
            transform: scale(1.1); /* Evita bordas brancas no blur */
        }

        .b-main-container {
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            gap: 80px;
            padding: 0 10%;
            box-sizing: border-box;
        }

        /* Moldura da Imagem (Estilo Pôster) */
        .b-poster-frame {
            width: 400px;
            height: 550px;
            flex-shrink: 0;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            overflow: hidden;
            background: #000;
        }

        .b-poster-img {
            width: 100%; height: 100%;
            object-fit: cover;
            animation: slowZoom 15s infinite alternate;
        }

        /* Texto Lateral */
        .b-info-side {
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .b-chapter-num {
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 8px;
            color: var(--bright-red);
            text-transform: uppercase;
        }

        .b-title {
            font-size: 5rem;
            margin: 0;
            color: #fff;
            text-transform: uppercase;
            line-height: 0.9;
            letter-spacing: -2px;
        }

        .b-desc {
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            font-size: 1.15rem;
            line-height: 1.8;
            color: #999;
            margin: 0;
        }

        .b-btn-play {
            margin-top: 20px;
            background: #fff;
            color: #000;
            border: none;
            padding: 20px 50px;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 4px;
            cursor: pointer;
            width: fit-content;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .b-btn-play:hover {
            background: var(--bright-red);
            color: #fff;
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255,0,0,0.3);
        }

        /* --- BOTÃO VOLTAR --- */
        .back-nav {
            position: absolute; 
            top: 50px; left: 50px;
            color: #444; 
            cursor: pointer; 
            font-size: 0.8rem;
            letter-spacing: 4px;
            transition: 0.3s;
            font-family: 'Inter', sans-serif;
            z-index: 10;
            text-transform: uppercase;
        }

        .back-nav:hover { color: #fff; }

        /* --- ANIMAÇÕES --- */
        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
            52% { opacity: 0.9; }
        }

        @keyframes slowZoom {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

    </style>
</head>
<body>

    <div class="crt-lines"></div>
    <div class="vignette"></div>

    <section id="screen-title" class="screen">
        <h1 class="glitch-title">OFFLINE</h1>
        <div class="menu-options">
            <button class="btn-menu" onclick="nav('screen-chapters')">Iniciar Banco de Dados</button>
            <button class="btn-menu">Arquivos</button>
            <button class="btn-menu">Sair</button>
        </div>
    </section>

    <section id="screen-chapters" class="screen hidden">
        <div class="back-nav" onclick="nav('screen-title')">Voltar ao Início</div>
        <h2 style="letter-spacing: 10px; color: #111; margin-bottom: 20px; font-family: 'Inter'; font-weight: 700;">CAPÍTULOS DISPONÍVEIS</h2>
        
        <div class="chapter-grid">
            <div class="ch-card" onclick="openBriefing(1)">
                <img src="https://raw.githubusercontent.com/dontevenbothernothingishere/prototype/refs/heads/main/20260316_191612_0000.png" class="ch-img-preview">
                <div class="ch-label">CAPÍTULO 01</div>
            </div>

            <div class="ch-card locked" onclick="openBriefing(2)">
                <svg class="lock-svg" viewBox="0 0 24 24"><path d="M18,8H17V6A5,5,0,0,0,7,6V8H6a2,2,0,0,0-2,2V20a2,2,0,0,0,2,2H18a2,2,0,0,0,2-2V10A2,2,0,0,0,18,8ZM9,6a3,3,0,0,1,6,0V8H9ZM18,20H6V10H18Z"/></svg>
                <div class="ch-label">BLOQUEADO</div>
            </div>

            <div class="ch-card locked" onclick="openBriefing(3)">
                <svg class="lock-svg" viewBox="0 0 24 24"><path d="M18,8H17V6A5,5,0,0,0,7,6V8H6a2,2,0,0,0-2,2V20a2,2,0,0,0,2,2H18a2,2,0,0,0,2-2V10A2,2,0,0,0,18,8ZM9,6a3,3,0,0,1,6,0V8H9ZM18,20H6V10H18Z"/></svg>
                <div class="ch-label">BLOQUEADO</div>
            </div>

            <div class="ch-card locked" onclick="openBriefing(4)">
                <svg class="lock-svg" viewBox="0 0 24 24"><path d="M18,8H17V6A5,5,0,0,0,7,6V8H6a2,2,0,0,0-2,2V20a2,2,0,0,0,2,2H18a2,2,0,0,0,2-2V10A2,2,0,0,0,18,8ZM9,6a3,3,0,0,1,6,0V8H9ZM18,20H6V10H18Z"/></svg>
                <div class="ch-label">BLOQUEADO</div>
            </div>

            <div class="ch-card locked" onclick="openBriefing(5)">
                <svg class="lock-svg" viewBox="0 0 24 24"><path d="M18,8H17V6A5,5,0,0,0,7,6V8H6a2,2,0,0,0-2,2V20a2,2,0,0,0,2,2H18a2,2,0,0,0,2-2V10A2,2,0,0,0,18,8ZM9,6a3,3,0,0,1,6,0V8H9ZM18,20H6V10H18Z"/></svg>
                <div class="ch-label">BLOQUEADO</div>
            </div>
        </div>
    </section>

    <section id="screen-briefing" class="screen hidden">
        
        <div class="b-background-blur">
            <img id="b-bg-blur" src="" class="b-bg-img-blur">
        </div>

        <div class="back-nav" onclick="nav('screen-chapters')">Sair da Seleção</div>

        <div class="b-main-container">
            <div class="b-poster-frame">
                <img id="b-img" src="" class="b-poster-img">
            </div>

            <div class="b-info-side">
                <span class="b-chapter-num" id="b-num">Capítulo 01</span>
                <h2 id="b-title" class="b-title"></h2>
                <p id="b-desc" class="b-desc"></p>
                <button class="b-btn-play" onclick="startGame()">Jogar Capítulo</button>
            </div>
        </div>

    </section>

    <script>
        const chapterData = {
            1: {
                locked: false,
                num: "Capítulo 01",
                title: "Conexão Perdida",
                desc: "Quando a live da tua streamer favorita ser cortada por um grito numa fábrica isolada, o pânico toma conta de todos. Decidido a encontrar respostas, atravessas os portões da fábrica sozinho porém no silêncio dos corredores vazios, rapidamente percebes que o que quer que tenha interrompido aquela live ainda está lá dentro.",
                img: "https://raw.githubusercontent.com/dontevenbothernothingishere/prototype/refs/heads/main/20260316_191612_0000.png"
            },
            2: { locked: true },
            3: { locked: true },
            4: { locked: true },
            5: { locked: true }
        };

        function nav(id) {
            const screens = document.querySelectorAll('.screen');
            screens.forEach(s => s.classList.add('hidden'));
            
            setTimeout(() => {
                const target = document.getElementById(id);
                if (target) target.classList.remove('hidden');
            }, 50);
        }

        function openBriefing(num) {
            const data = chapterData[num];
            if (data.locked) return;

            document.getElementById('b-num').innerText = data.num;
            document.getElementById('b-title').innerText = data.title;
            document.getElementById('b-desc').innerText = data.desc;
            document.getElementById('b-img').src = data.img;
            document.getElementById('b-bg-blur').src = data.img;
            
            nav('screen-briefing');
        }

        function startGame() {
            document.body.style.transition = "2s";
            document.body.style.backgroundColor = "#fff";
            document.body.style.filter = "brightness(5)";
            setTimeout(() => {
                alert("CONEXÃO INICIADA.");
                location.reload();
            }, 1000);
        }

        window.onload = () => {
            console.log("Sistema Inicializado.");
        };
    </script>
</body>
</html>

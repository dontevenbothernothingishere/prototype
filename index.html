<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OFFLINE | Game Interface</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Courier+Prime:wght@400;700&display=swap');

        :root {
            --blood: #660000;
            --bright-red: #ff0000;
            --bg: #030303;
            --gray: #121212;
            --lock-gray: #2a2a2a;
            --scanline-color: rgba(255, 255, 255, 0.05);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg);
            color: #eee;
            font-family: 'Special Elite', serif;
            overflow: hidden;
        }

        /* --- FILTROS DE ATMOSFERA (CAMADAS CRT) --- */
        .crt-lines {
            position: fixed; inset: 0;
            background: linear-gradient(var(--scanline-color) 50%, transparent 50%);
            background-size: 100% 4px;
            z-index: 1000; pointer-events: none;
        }

        .vignette {
            position: fixed; inset: 0;
            background: radial-gradient(circle, transparent 20%, black 150%);
            z-index: 1001; pointer-events: none;
        }

        /* --- SISTEMA DE GERENCIAMENTO DE TELAS --- */
        .screen {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 50px;
            transition: opacity 0.3s ease-in-out, transform 0.3s ease-out;
        }

        .hidden { 
            opacity: 0; 
            pointer-events: none; 
            transform: scale(1.02); /* Leve zoom ao trocar para parecer distorção de sinal */
        }

        /* --- TELA DE TÍTULO (INICIAL) --- */
        .glitch-title {
            font-size: 8rem;
            letter-spacing: 20px;
            color: #fff;
            margin: 0;
            animation: flicker 5s infinite;
            text-shadow: 2px 2px var(--blood);
        }

        .menu-options {
            margin-top: 40px;
            display: flex; flex-direction: column; gap: 15px;
        }

        .btn-menu {
            background: none; border: none;
            color: #555; font-family: 'Courier Prime', monospace;
            font-size: 1.5rem; cursor: pointer;
            text-transform: uppercase; transition: 0.2s;
            text-align: center;
        }

        .btn-menu:hover { 
            color: #fff; 
            letter-spacing: 5px;
            text-shadow: 0 0 8px #fff;
        }

        /* --- TELA DE SELEÇÃO DE CAPÍTULOS --- */
        .chapter-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
            width: 95%;
            margin-top: 50px;
        }

        .ch-card {
            background: var(--gray);
            border: 1px solid #222;
            height: 350px;
            cursor: pointer; transition: 0.3s ease;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ch-card:not(.locked):hover { 
            border-color: var(--bright-red);
            box-shadow: 0 0 20px rgba(255,0,0,0.15);
            transform: translateY(-5px);
        }

        .ch-img-preview {
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0.4;
            transition: 0.5s;
        }

        .ch-card:not(.locked):hover .ch-img-preview { 
            opacity: 0.8; 
            transform: scale(1.05); 
        }

        /* ESTILO DO CADEADO (SVG CINZA) */
        .ch-card.locked {
            cursor: not-allowed;
            background: #080808;
            border: 1px solid #1a1a1a;
        }

        .lock-svg {
            width: 50px;
            height: 50px;
            fill: var(--lock-gray);
            transition: 0.3s;
            z-index: 2;
        }

        .ch-card.locked:hover .lock-svg {
            fill: #444;
            transform: scale(1.1);
        }

        .ch-label {
            position: absolute; bottom: 0; width: 100%;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            padding: 20px 0;
            text-align: center;
            font-size: 1rem;
            letter-spacing: 2px;
            z-index: 3;
            color: #444;
        }

        .ch-card:not(.locked) .ch-label { color: #fff; }

        /* --- TELA DE BRIEFING (DETALHES) --- */
        .briefing-layout {
            display: flex; gap: 40px;
            max-width: 1100px; width: 100%;
            background: rgba(5,5,5,0.9);
            padding: 30px; border: 1px solid #1a1a1a;
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        .briefing-main-img {
            width: 450px; height: 500px;
            background: #000; 
            border: 1px solid #333;
            object-fit: cover;
            filter: grayscale(0.5) contrast(1.2);
        }

        .briefing-content {
            flex: 1; display: flex; flex-direction: column;
            justify-content: space-between;
        }

        .b-header { 
            border-bottom: 2px solid var(--blood); 
            padding-bottom: 15px; 
        }

        .b-title { 
            font-size: 3.5rem; 
            color: #fff; 
            margin: 0; 
            text-transform: uppercase;
            text-shadow: 3px 3px #000;
        }

        .b-desc { 
            font-family: 'Courier Prime'; 
            line-height: 1.8; 
            color: #aaa; 
            margin-top: 25px; 
            font-size: 1.1rem; 
            text-align: justify;
        }

        .btn-start-game {
            background: #440000; color: #fff;
            border: 1px solid var(--bright-red);
            padding: 20px; font-size: 1.8rem;
            font-family: 'Special Elite'; cursor: pointer;
            transition: 0.3s;
            margin-top: 20px;
        }

        .btn-start-game:hover { 
            background: var(--bright-red); 
            color: #000; 
            box-shadow: 0 0 30px var(--bright-red); 
        }

        /* --- BOTÕES DE NAVEGAÇÃO (VOLTAR) --- */
        .back-nav {
            position: absolute; 
            top: 40px; 
            left: 40px;
            color: #333; 
            cursor: pointer; 
            font-size: 1rem;
            font-family: 'Courier Prime', monospace;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
            border: 1px solid transparent;
            padding: 5px 10px;
        }

        .back-nav:hover { 
            color: #fff; 
            border-color: #444;
            background: rgba(255,255,255,0.05);
        }

        /* --- ANIMAÇÕES --- */
        @keyframes flicker {
            0%, 100% { opacity: 1; transform: skew(0deg); }
            50% { opacity: 0.8; }
            51% { opacity: 0.9; transform: skew(0.2deg); }
            52% { opacity: 1; }
        }

    </style>
</head>
<body>

    <div class="crt-lines"></div>
    <div class="vignette"></div>

    <section id="screen-title" class="screen">
        <h1 class="glitch-title">OFFLINE</h1>
        
        <div class="menu-options">
            <button class="btn-menu" onclick="nav('screen-chapters')">Acessar Banco de Dados</button>
            <button class="btn-menu">Logs de Erro</button>
            <button class="btn-menu" onclick="window.close()">Encerrar Terminal</button>
        </div>
    </section>

    <section id="screen-chapters" class="screen hidden">
        <div class="back-nav" onclick="nav('screen-title')">
            [ < ] MENU_PRINCIPAL
        </div>

        <h2 style="letter-spacing: 15px; color: #222; margin-bottom: 20px;">DIRETÓRIOS_DISPONÍVEIS</h2>
        
        <div class="chapter-grid">
            <div class="ch-card" onclick="openBriefing(1)">
                <img src="https://raw.githubusercontent.com/dontevenbothernothingishere/prototype/refs/heads/main/chapter1.jpg" class="ch-img-preview">
                <div class="ch-label">CAPÍTULO 1</div>
            </div>

            <div class="ch-card locked" onclick="openBriefing(2)">
                <svg class="lock-svg" viewBox="0 0 24 24">
                    <path d="M18,8H17V6A5,5,0,0,0,7,6V8H6a2,2,0,0,0-2,2V20a2,2,0,0,0,2,2H18a2,2,0,0,0,2-2V10A2,2,0,0,0,18,8ZM9,6a3,3,0,0,1,6,0V8H9ZM18,20H6V10H18Z"/>
                </svg>
                <div class="ch-label">CAPÍTULO 2</div>
            </div>

            <div class="ch-card locked" onclick="openBriefing(3)">
                <svg class="lock-svg" viewBox="0 0 24 24">
                    <path d="M18,8H17V6A5,5,0,0,0,7,6V8H6a2,2,0,0,0-2,2V20a2,2,0,0,0,2,2H18a2,2,0,0,0,2-2V10A2,2,0,0,0,18,8ZM9,6a3,3,0,0,1,6,0V8H9ZM18,20H6V10H18Z"/>
                </svg>
                <div class="ch-label">CAPÍTULO 3</div>
            </div>

            <div class="ch-card locked" onclick="openBriefing(4)">
                <svg class="lock-svg" viewBox="0 0 24 24">
                    <path d="M18,8H17V6A5,5,0,0,0,7,6V8H6a2,2,0,0,0-2,2V20a2,2,0,0,0,2,2H18a2,2,0,0,0,2-2V10A2,2,0,0,0,18,8ZM9,6a3,3,0,0,1,6,0V8H9ZM18,20H6V10H18Z"/>
                </svg>
                <div class="ch-label">CAPÍTULO 4</div>
            </div>

            <div class="ch-card locked" onclick="openBriefing(5)">
                <svg class="lock-svg" viewBox="0 0 24 24">
                    <path d="M18,8H17V6A5,5,0,0,0,7,6V8H6a2,2,0,0,0-2,2V20a2,2,0,0,0,2,2H18a2,2,0,0,0,2-2V10A2,2,0,0,0,18,8ZM9,6a3,3,0,0,1,6,0V8H9ZM18,20H6V10H18Z"/>
                </svg>
                <div class="ch-label">CAPÍTULO 5</div>
            </div>
        </div>
    </section>

    <section id="screen-briefing" class="screen hidden">
        <div class="back-nav" onclick="nav('screen-chapters')">
            [ < ] VOLTAR_AOS_ARQUIVOS
        </div>

        <div class="briefing-layout">
            <img id="b-img" src="" class="briefing-main-img">
            
            <div class="briefing-content">
                <div class="b-header">
                    <h2 id="b-title" class="b-title">NOME_ARQUIVO</h2>
                </div>
                
                <p id="b-desc" class="b-desc">Carregando metadados do setor...</p>
                
                <button class="btn-start-game" onclick="startGame()">CONECTAR AO SETOR</button>
            </div>
        </div>
    </section>

    <script>
        /**
         * BANCO DE DADOS DOS CAPÍTULOS
         * Configure aqui se o capítulo está trancado, o título, a descrição e a URL da imagem.
         */
        const chapterData = {
            1: {
                locked: false,
                title: "O Despertar",
                desc: "O sistema reiniciou, mas o prédio continua morto. Você ouve passos vindos da ventilação. Algo está tentando se comunicar através das telas de monitoramento antigas. Não olhe para trás enquanto o sinal estiver instável.",
                img: "https://raw.githubusercontent.com/dontevenbothernothingishere/prototype/refs/heads/main/chapter1.jpg"
            },
            2: {
                locked: true,
                title: "Corredores Vazios",
                desc: "A iluminação de emergência é sua única amiga. Não corra. O som dos seus passos atrai a atenção de quem não tem olhos, mas ouve a sua respiração.",
                img: "" // Futura imagem aqui
            },
            3: {
                locked: true,
                title: "O Servidor Central",
                desc: "O coração de 'OFFLINE'. Os dados estão corrompidos e a realidade está começando a dobrar. Encontre o código de acesso antes que o hardware derreta.",
                img: ""
            },
            4: {
                locked: true,
                title: "Laboratório de Testes",
                desc: "Eles criaram algo que não pode ser deletado. O experimento 04 fugiu da sandbox digital e agora habita o hardware físico da instalação.",
                img: ""
            },
            5: {
                locked: true,
                title: "Desconexão Total",
                desc: "Não há mais volta. O sistema vai apagar tudo em 5 minutos. Você é o único arquivo restante no disco rígido. Salve-se ou seja apagado.",
                img: ""
            }
        };

        /**
         * FUNÇÃO DE NAVEGAÇÃO ENTRE TELAS
         * @param {string} id - O ID da section que deve ser exibida
         */
        function nav(id) {
            // Pequeno flash de cor para simular interferência de monitor
            document.body.style.backgroundColor = "#220000";
            
            setTimeout(() => {
                document.body.style.backgroundColor = var(--bg);
                
                // Oculta todas as telas
                document.querySelectorAll('.screen').forEach(s => {
                    s.classList.add('hidden');
                });

                // Exibe a tela desejada
                const target = document.getElementById(id);
                if (target) {
                    target.classList.remove('hidden');
                }
            }, 100);
        }

        /**
         * FUNÇÃO PARA CARREGAR OS DADOS NA TELA DE BRIEFING
         * @param {number} num - O número do capítulo selecionado
         */
        function openBriefing(num) {
            const data = chapterData[num];
            
            // Impede a abertura se estiver trancado
            if (data.locked) {
                console.warn("ACESSO NEGADO: Diretório protegido por criptografia.");
                // Opcional: Adicionar um efeito de som de erro aqui
                return; 
            }

            // Preenche os campos da tela de briefing
            const titleElem = document.getElementById('b-title');
            const descElem = document.getElementById('b-desc');
            const imgElem = document.getElementById('b-img');

            titleElem.innerText = data.title;
            descElem.innerText = data.desc;
            imgElem.src = data.img;
            
            // Navega para a tela de briefing
            nav('screen-briefing');
        }

        /**
         * FUNÇÃO PARA INICIAR O JOGO (FINAL)
         */
        function startGame() {
            // Efeito visual dramático de inversão
            document.body.style.filter = "invert(1) contrast(2) grayscale(1)";
            
            setTimeout(() => {
                alert("CONEXÃO ESTABELECIDA.\nSINCRONIZANDO CONSCIÊNCIA...");
                
                // Aqui você redirecionaria para a página real do jogo:
                // window.location.href = "game_cap1.html";
                
                // Para o protótipo, apenas resetamos o filtro e voltamos
                document.body.style.filter = "none";
                nav('screen-title');
            }, 800);
        }

        // Event listener para teclas de atalho (Opcional)
        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape") {
                // Se apertar ESC, tenta sempre voltar uma tela
                const briefingVisible = !document.getElementById('screen-briefing').classList.contains('hidden');
                const chaptersVisible = !document.getElementById('screen-chapters').classList.contains('hidden');

                if (briefingVisible) nav('screen-chapters');
                else if (chaptersVisible) nav('screen-title');
            }
        });

    </script>
</body>
</html>

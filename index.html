<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OFFLINE - Prototype</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Courier+Prime:wght@400;700&display=swap');

        :root {
            --blood: #8b0000;
            --terminal-green: #1aff1a;
            --vhs-gray: #1a1a1a;
            --glitch-speed: 0.2s;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050505;
            color: #ccc;
            font-family: 'Special Elite', serif;
            overflow: hidden;
        }

        /* --- VHS SCANLINE OVERLAY --- */
        .crt-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            z-index: 100;
            pointer-events: none;
            opacity: 0.5;
        }

        .vignette {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle, transparent 40%, black 150%);
            z-index: 101;
            pointer-events: none;
        }

        /* --- SCREENS --- */
        .screen {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease;
        }

        .hidden { opacity: 0; pointer-events: none; }

        /* --- TITLE SCREEN --- */
        .logo-container { position: relative; }

        .title {
            font-size: 8rem;
            color: white;
            letter-spacing: 20px;
            margin: 0;
            text-shadow: 2px 2px var(--blood);
            animation: glitch 3s infinite;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            2% { transform: translate(-5px, 2px) skew(5deg); }
            4% { transform: translate(5px, -2px) skew(-5deg); }
            6% { transform: translate(0); }
        }

        .main-menu {
            margin-top: 50px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .menu-item {
            font-family: 'Courier Prime', monospace;
            font-size: 1.5rem;
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
            text-align: left;
        }

        .menu-item:hover {
            color: white;
            text-shadow: 0 0 10px white;
            transform: scale(1.1);
        }

        .menu-item::before { content: "> "; opacity: 0; }
        .menu-item:hover::before { opacity: 1; }

        /* --- CHAPTER SELECT --- */
        .chapter-list {
            display: flex;
            gap: 20px;
            margin-top: 30px;
        }

        .chapter-box {
            width: 180px;
            height: 250px;
            border: 1px solid #333;
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.4s;
            position: relative;
            filter: grayscale(1);
        }

        .chapter-box:hover {
            border-color: var(--blood);
            transform: translateY(-10px);
            filter: grayscale(0);
            box-shadow: 0 0 20px rgba(139, 0, 0, 0.4);
        }

        .chapter-img {
            width: 100%;
            height: 120px;
            background: #151515;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            color: #444;
        }

        .chapter-title { font-size: 1rem; color: #fff; }
        .status { font-size: 0.7rem; margin-top: 10px; color: #555; }

        .locked { cursor: not-allowed; opacity: 0.4; }
        .locked:hover { transform: none; border-color: #333; box-shadow: none; }

        /* --- BACK BUTTON --- */
        .btn-back {
            position: absolute;
            bottom: 50px;
            left: 50px;
            color: #444;
            text-decoration: none;
            font-family: 'Courier Prime';
            cursor: pointer;
        }

        .btn-back:hover { color: white; }

    </style>
</head>
<body>

    <div class="crt-overlay"></div>
    <div class="vignette"></div>

    <div id="screen-main" class="screen">
        <div class="logo-container">
            <h1 class="title">OFFLINE</h1>
        </div>
        <p style="color: var(--blood); letter-spacing: 5px;">CONNECTION LOST</p>

        <nav class="main-menu">
            <button class="menu-item" onclick="changeScreen('screen-chapters')">Resume Log</button>
            <button class="menu-item" onclick="changeScreen('screen-chapters')">New Entry</button>
            <button class="menu-item">System Settings</button>
            <button class="menu-item">Quit</button>
        </nav>
    </div>

    <div id="screen-chapters" class="screen hidden">
        <h2 style="font-size: 3rem; margin-bottom: 0;">DIRECTORIES</h2>
        <p style="margin-bottom: 40px; color: #444;">Select a corrupted sector to investigate.</p>

        <div class="chapter-list">
            <div class="chapter-box" onclick="playChapter(1)">
                <div class="chapter-img">FILE_01</div>
                <span class="chapter-title">The Server Room</span>
                <span class="status" style="color: var(--terminal-green);">AVAILABLE</span>
            </div>

            <div class="chapter-box" onclick="playChapter(2)">
                <div class="chapter-img">FILE_02</div>
                <span class="chapter-title">Maintenance</span>
                <span class="status">ENCRYPTED</span>
            </div>

            <div class="chapter-box locked">
                <div class="chapter-img">FILE_03</div>
                <span class="chapter-title">The Hive</span>
                <span class="status">LOCKED</span>
            </div>

            <div class="chapter-box locked">
                <div class="chapter-img">FILE_04</div>
                <span class="chapter-title">Breakroom</span>
                <span class="status">LOCKED</span>
            </div>

            <div class="chapter-box locked">
                <div class="chapter-img">FILE_05</div>
                <span class="chapter-title">The Admin</span>
                <span class="status">LOCKED</span>
            </div>
        </div>

        <a class="btn-back" onclick="changeScreen('screen-main')">< RETURN TO MAIN</a>
    </div>

    <script>
        function changeScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            
            // Play a subtle static sound effect (logic)
            console.log("Switching to: " + id);
        }

        function playChapter(num) {
            // Flash effect for horror feel
            document.body.style.backgroundColor = "white";
            setTimeout(() => {
                document.body.style.backgroundColor = "#050505";
                alert("ACCESSING CHAPTER " + num + "...");
            }, 50);
        }

        // Randomly flicker the screen
        setInterval(() => {
            if(Math.random() > 0.98) {
                document.querySelector('.vignette').style.opacity = "0.2";
                setTimeout(() => document.querySelector('.vignette').style.opacity = "1", 50);
            }
        }, 100);
    </script>
</body>
</html>

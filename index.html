<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OFFLINE | Prototype</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Courier+Prime:wght@400;700&display=swap');

        :root {
            --blood: #7a0000;
            --bright-red: #ff0000;
            --bg: #050505;
            --panel: #0d0d0d;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg);
            color: #ccc;
            font-family: 'Special Elite', serif;
            overflow: hidden;
        }

        /* --- FILTROS DE TERROR --- */
        .overlay {
            position: fixed; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 2px 100%;
            z-index: 1000; pointer-events: none;
        }

        .vignette {
            position: fixed; inset: 0;
            background: radial-gradient(circle, transparent 20%, black 150%);
            z-index: 1001; pointer-events: none;
        }

        /* --- SISTEMA DE TELAS --- */
        .screen {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 50px;
            transition: opacity 0.4s ease-in-out;
        }

        .hidden { opacity: 0; pointer-events: none; }

        /* --- TELA 1: TÍTULO --- */
        .title {
            font-size: 10rem;
            letter-spacing: 30px;
            color: white;
            text-shadow: 5px 5px var(--blood);
            margin: 0;
        }

        .menu { margin-top: 60px; display: flex; flex-direction: column; gap: 20px; }
        .btn-menu {
            background: none; border: none; color: #555;
            font-family: 'Courier Prime', monospace; font-size: 2rem;
            cursor: pointer; text-transform: uppercase; transition: 0.3s;
        }
        .btn-menu:hover { color: white; transform: scale(1.1); letter-spacing: 5px; }

        /* --- TELA 2: SELEÇÃO (MUITO MAIS LIMPO) --- */
        .chapter-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
            width: 85%;
            margin-top: 50px;
        }

        .ch-box {
            aspect-ratio: 2/3;
            background: var(--panel);
            border: 2px solid #222;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            cursor: pointer; transition: 0.4s;
        }

        .ch-box:hover {
            border-color: var(--bright-red);
            background: #150000;
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.3);
        }

        .ch-box h3 {
            font-size: 1.2rem; color: #444; letter-spacing: 2px; transition: 0.3s;
        }

        .ch-box:hover h3 { color: white; }

        /* --- TELA 3: BRIEFING (A TELA DA DESCRIÇÃO) --- */
        .briefing-card {
            width: 900px;
            height: 600px;
            background: #0a0a0a;
            border: 1px solid #333;
            display: flex;
            box-shadow: 0 0 50px black;
        }

        .briefing-side-img {
            width: 40%;
            background: #000;
            border-right: 1px solid #222;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        .briefing-content {
            flex: 1;
            padding: 50px;
            display: flex; flex-direction: column;
            justify-content: space-between;
        }

        .b-header { font-size: 3.5rem; color: var(--bright-red); margin: 0; }
        .b-desc { font-family: 'Courier Prime'; font-size: 1.2rem; color: #777; line-height: 1.6; }

        .btn-play {
            background: var(--blood); color: white;
            border: 1px solid #ff4444; padding: 20px;
            font-size: 1.8rem; font-family: 'Special Elite';
            cursor: pointer; transition: 0.3s;
        }

        .btn-play:hover { background: var(--bright-red); box-shadow: 0 0 30px var(--bright-red); }

        .back-btn {
            position: absolute; top: 40px; left: 40px;
            background: none; border: none; color: #444;
            font-family: 'Courier Prime'; cursor: pointer; font-size: 1.2rem;
        }
        .back-btn:hover { color: white; }

    </style>
</head>
<body>

    <div class="overlay"></div>
    <div class="vignette"></div>

    <section id="screen-title" class="screen">
        <h1 class="title">OFFLINE</h1>
        <div class="menu">
            <button class="btn-menu" onclick="nav('screen-chapters')">Iniciar_Sessão</button>
            <button class="btn-menu">Logs</button>
            <button class="btn-menu">Sair</button>
        </div>
    </section>

    <section id="screen-chapters" class="screen hidden">
        <button class="back-btn" onclick="nav('screen-title')">< MENU_PRINCIPAL</button>
        <h2 style="font-size: 3rem; color: #444;">ARQUIVOS_DE_MEMÓRIA</h2>
        
        <div class="chapter-grid">
            <div class="ch-box" onclick="showBriefing(1)"><h3>CAPÍTULO 1</h3></div>
            <div class="ch-box" onclick="showBriefing(2)"><h3>CAPÍTULO 2</h3></div>
            <div class="ch-box" onclick="showBriefing(3)"><h3>CAPÍTULO 3</h3></div>
            <div class="ch-box" onclick="showBriefing(4)"><h3>CAPÍTULO 4</h3></div>
            <div class="ch-box" onclick="showBriefing(5)"><h3>CAPÍTULO 5</h3></div>
        </div>
    </section>

    <section id="screen-briefing" class="screen hidden">
        <button class="back-btn" onclick="nav('screen-chapters')">< VOLTAR_SELEÇÃO</button>
        
        <div class="briefing-card">
            <div class="briefing-side-img">
                <span id="b-num-big" style="font-size: 10rem; color: #111;">01</span>
            </div>
            <div class="briefing-content">
                <div>
                    <h2 id="b-title" class="b-header">TÍTULO_AQUI</h2>
                    <p id="b-desc" class="b-desc">Descrição do horror...</p>
                </div>
                <button class="btn-play" onclick="finalStart()">INICIAR CAPÍTULO</button>
            </div>
        </div>
    </section>

    <script>
        const chapterInfo = {
            1: {
                name: "O DESPERTAR",
                desc: "O sistema detectou um usuário não autorizado. As luzes de emergência são sua única guia. O que quer que esteja fazendo esse barulho de metal no final do corredor... não é humano."
            },
            2: {
                name: "ECOS NO VAZIO",
                desc: "A manutenção do setor B parou há 10 anos. Então, por que as máquinas ainda estão quentes? Alguém — ou algo — está mantendo este lugar vivo."
            },
            3: {
                name: "CONEXÃO PERDIDA",
                desc: "Você chegou à central. O ar aqui é pesado e cheira a ozônio. Os monitores estão mostrando imagens da sua própria casa. Como isso é possível?"
            },
            4: {
                name: "SANGUE E DADOS",
                desc: "A digitalização falhou. Os corpos foram deixados para trás, mas as mentes foram presas na rede. Elas estão bravas. Elas querem um hospedeiro."
            },
            5: {
                name: "OFFLINE",
                desc: "Fim da linha. O servidor principal está à frente. Desconecte o sistema ou torne-se parte dele para sempre. Não há mais volta."
            }
        };

        function nav(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function showBriefing(num) {
            const info = chapterInfo[num];
            document.getElementById('b-title').innerText = info.name;
            document.getElementById('b-desc').innerText = info.desc;
            document.getElementById('b-num-big').innerText = "0" + num;
            
            nav('screen-briefing');
        }

        function finalStart() {
            // Efeito de glitch final
            document.body.style.backgroundColor = "red";
            setTimeout(() => {
                document.body.style.backgroundColor = "black";
                alert("CONEXÃO ESTABELECIDA. BOA SORTE.");
            }, 100);
        }
    </script>
</body>
</html>

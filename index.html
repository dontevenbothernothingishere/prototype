<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OFFLINE | Game Interface</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Courier+Prime:wght@400;700&display=swap');

        :root {
            --blood: #660000;
            --bright-red: #ff0000;
            --bg: #030303;
            --gray: #121212;
            --scanline-color: rgba(255, 255, 255, 0.05);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg);
            color: #eee;
            font-family: 'Special Elite', serif;
            overflow: hidden;
        }

        /* --- FILTROS DE ATMOSFERA --- */
        .crt-lines {
            position: fixed; inset: 0;
            background: linear-gradient(var(--scanline-color) 50%, transparent 50%);
            background-size: 100% 4px;
            z-index: 1000; pointer-events: none;
        }

        .vignette {
            position: fixed; inset: 0;
            background: radial-gradient(circle, transparent 20%, black 150%);
            z-index: 1001; pointer-events: none;
        }

        /* --- SISTEMA DE TELAS --- */
        .screen {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 50px;
            transition: opacity 0.3s ease-in-out;
        }

        .hidden { opacity: 0; pointer-events: none; }

        /* --- TELA DE TÍTULO --- */
        .glitch-title {
            font-size: 8rem;
            letter-spacing: 20px;
            color: #fff;
            margin: 0;
            animation: flicker 5s infinite;
        }

        .menu-options {
            margin-top: 40px;
            display: flex; flex-direction: column; gap: 15px;
        }

        .btn-menu {
            background: none; border: none;
            color: #555; font-family: 'Courier Prime', monospace;
            font-size: 1.5rem; cursor: pointer;
            text-transform: uppercase; transition: 0.2s;
            text-align: center;
        }

        .btn-menu:hover { color: #fff; letter-spacing: 5px; }

        /* --- TELA DE SELEÇÃO (CARDS) --- */
        .chapter-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
            width: 95%;
            margin-top: 50px;
        }

        .ch-card {
            background: var(--gray);
            border: 1px solid #222;
            height: 350px;
            cursor: pointer; transition: 0.3s ease;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ch-card:not(.locked):hover { 
            border-color: var(--bright-red);
            box-shadow: 0 0 20px rgba(255,0,0,0.15);
        }

        .ch-img-preview {
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0.4;
            transition: 0.5s;
        }

        .ch-card:not(.locked):hover .ch-img-preview { opacity: 0.8; transform: scale(1.05); }

        /* Estilo para Capítulo Bloqueado */
        .ch-card.locked {
            cursor: not-allowed;
            border: 1px dashed #222;
        }

        .lock-icon {
            font-size: 3rem;
            color: #333;
            position: absolute;
            z-index: 2;
        }

        .ch-label {
            position: absolute; bottom: 0; width: 100%;
            background: linear-gradient(transparent, black);
            padding: 20px 0;
            text-align: center;
            font-size: 1.2rem;
            letter-spacing: 2px;
            z-index: 3;
        }

        /* --- TELA DE BRIEFING --- */
        .briefing-layout {
            display: flex; gap: 40px;
            max-width: 1100px; width: 100%;
            background: rgba(5,5,5,0.9);
            padding: 30px; border: 1px solid #1a1a1a;
        }

        .briefing-main-img {
            width: 450px; height: 500px;
            background: #000; 
            border: 1px solid #333;
            object-fit: cover;
        }

        .briefing-content {
            flex: 1; display: flex; flex-direction: column;
            justify-content: space-between;
        }

        .b-header { border-bottom: 2px solid var(--blood); padding-bottom: 15px; }
        .b-title { font-size: 3.5rem; color: #fff; margin: 0; text-transform: uppercase; }
        .b-desc { font-family: 'Courier Prime'; line-height: 1.8; color: #aaa; margin-top: 25px; font-size: 1.1rem; }

        .btn-start-game {
            background: #440000; color: #fff;
            border: 1px solid var(--bright-red);
            padding: 20px; font-size: 1.8rem;
            font-family: 'Special Elite'; cursor: pointer;
            transition: 0.3s;
        }

        .btn-start-game:hover { background: var(--bright-red); color: #000; box-shadow: 0 0 30px var(--bright-red); }

        .back-nav {
            position: absolute; top: 40px; left: 40px;
            color: #333; cursor: pointer; font-size: 0.9rem;
        }
        .back-nav:hover { color: #fff; }

        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
            52% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="crt-lines"></div>
    <div class="vignette"></div>

    <section id="screen-title" class="screen">
        <h1 class="glitch-title">OFFLINE</h1>
        <div class="menu-options">
            <button class="btn-menu" onclick="nav('screen-chapters')">Iniciar Sistema</button>
            <button class="btn-menu">Arquivos de Log</button>
            <button class="btn-menu">Sair</button>
        </div>
    </section>

    <section id="screen-chapters" class="screen hidden">
        <div class="back-nav" onclick="nav('screen-title')">[ VOLTAR ]</div>
        <h2 style="letter-spacing: 15px; color: #333;">DATABASE_CHAPTERS</h2>
        
        <div class="chapter-grid">
            <div class="ch-card" onclick="openBriefing(1)">
                <img src="https://raw.githubusercontent.com/dontevenbothernothingishere/prototype/refs/heads/main/chapter1.jpg" class="ch-img-preview">
                <div class="ch-label">CAPÍTULO 1</div>
            </div>

            <div class="ch-card locked" onclick="openBriefing(2)">
                <div class="lock-icon">🔒</div>
                <div class="ch-label">CAPÍTULO 2</div>
            </div>
            <div class="ch-card locked" onclick="openBriefing(3)">
                <div class="lock-icon">🔒</div>
                <div class="ch-label">CAPÍTULO 3</div>
            </div>
            <div class="ch-card locked" onclick="openBriefing(4)">
                <div class="lock-icon">🔒</div>
                <div class="ch-label">CAPÍTULO 4</div>
            </div>
            <div class="ch-card locked" onclick="openBriefing(5)">
                <div class="lock-icon">🔒</div>
                <div class="ch-label">CAPÍTULO 5</div>
            </div>
        </div>
    </section>

    <section id="screen-briefing" class="screen hidden">
        <div class="back-nav" onclick="nav('screen-chapters')">[ CANCELAR_CONEXÃO ]</div>
        <div class="briefing-layout">
            <img id="b-img" src="" class="briefing-main-img">
            <div class="briefing-content">
                <div class="b-header">
                    <h2 id="b-title" class="b-title"></h2>
                </div>
                <p id="b-desc" class="b-desc"></p>
                <button class="btn-start-game" onclick="startGame()">CONECTAR AGORA</button>
            </div>
        </div>
    </section>

    <script>
        const chapterData = {
            1: {
                locked: false,
                title: "O Despertar",
                desc: "O sistema reiniciou, mas o prédio continua morto. Você ouve passos vindos da ventilação. Algo está tentando se comunicar através das telas.",
                img: "https://raw.githubusercontent.com/dontevenbothernothingishere/prototype/refs/heads/main/chapter1.jpg"
            },
            2: { locked: true },
            3: { locked: true },
            4: { locked: true },
            5: { locked: true }
        };

        function nav(id) {
            document.body.style.backgroundColor = "#111";
            setTimeout(() => {
                document.body.style.backgroundColor = "#030303";
                document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
                document.getElementById(id).classList.remove('hidden');
            }, 150);
        }

        function openBriefing(num) {
            const data = chapterData[num];
            
            // Se estiver bloqueado, não faz nada (ou você pode colocar um alerta/som)
            if (data.locked) {
                console.log("Acesso negado: Capítulo bloqueado.");
                return; 
            }

            document.getElementById('b-title').innerText = data.title;
            document.getElementById('b-desc').innerText = data.desc;
            document.getElementById('b-img').src = data.img;
            
            nav('screen-briefing');
        }

        function startGame() {
            document.body.style.filter = "invert(1) contrast(2)";
            setTimeout(() => {
                alert("CONEXÃO ESTABELECIDA. BOA SORTE.");
                location.reload();
            }, 500);
        }
    </script>
</body>
</html>

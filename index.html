<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OFFLINE | Game Interface</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Courier+Prime:wght@400;700&display=swap');

        :root {
            --blood: #660000;
            --bright-red: #ff0000;
            --bg: #030303;
            --gray: #121212;
            --lock-gray: #2a2a2a;
            --scanline-color: rgba(255, 255, 255, 0.05);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg);
            color: #eee;
            font-family: 'Special Elite', serif;
            overflow: hidden;
        }

        /* --- FILTROS DE ATMOSFERA (EFEITO CRT) --- */
        .crt-lines {
            position: fixed; inset: 0;
            background: linear-gradient(var(--scanline-color) 50%, transparent 50%);
            background-size: 100% 4px;
            z-index: 1000; pointer-events: none;
        }

        .vignette {
            position: fixed; inset: 0;
            background: radial-gradient(circle, transparent 20%, black 150%);
            z-index: 1001; pointer-events: none;
        }

        /* --- SISTEMA DE TELAS --- */
        .screen {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 50px;
            transition: opacity 0.3s ease-in-out, transform 0.3s ease-in-out;
        }

        .hidden { 
            opacity: 0; 
            pointer-events: none; 
            transform: scale(0.98);
        }

        /* --- TELA DE TÍTULO --- */
        .glitch-title {
            font-size: 8rem;
            letter-spacing: 20px;
            color: #fff;
            margin: 0;
            animation: flicker 5s infinite;
            text-shadow: 0 0 15px var(--blood);
        }

        .menu-options {
            margin-top: 40px;
            display: flex; flex-direction: column; gap: 15px;
        }

        .btn-menu {
            background: none; border: none;
            color: #555; font-family: 'Courier Prime', monospace;
            font-size: 1.5rem; cursor: pointer;
            text-transform: uppercase; transition: 0.2s;
            text-align: center;
            letter-spacing: 2px;
        }

        .btn-menu:hover { 
            color: #fff; 
            letter-spacing: 5px;
            text-shadow: 0 0 10px #fff;
        }

        /* --- TELA DE SELEÇÃO DE CAPÍTULOS --- */
        .chapter-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
            width: 95%;
            margin-top: 50px;
        }

        .ch-card {
            background: var(--gray);
            border: 1px solid #222;
            height: 350px;
            cursor: pointer; transition: 0.3s ease;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ch-card:not(.locked):hover { 
            border-color: var(--bright-red);
            box-shadow: 0 0 20px rgba(255,0,0,0.15);
            transform: translateY(-5px);
        }

        .ch-img-preview {
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0.4;
            transition: 0.5s;
        }

        .ch-card:not(.locked):hover .ch-img-preview { 
            opacity: 0.8; 
            transform: scale(1.05); 
        }

        /* --- ESTILO DO CADEADO (LOCKED) --- */
        .ch-card.locked {
            cursor: not-allowed;
            background: #080808;
            border: 1px solid #1a1a1a;
        }

        .lock-svg {
            width: 50px;
            height: 50px;
            fill: var(--lock-gray);
            transition: 0.3s;
            z-index: 2;
        }

        .ch-card.locked:hover .lock-svg {
            fill: #444;
            transform: scale(1.1);
        }

        .ch-label {
            position: absolute; bottom: 0; width: 100%;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            padding: 20px 0;
            text-align: center;
            font-size: 1rem;
            letter-spacing: 2px;
            z-index: 3;
            color: #444;
        }

        .ch-card:not(.locked) .ch-label { color: #fff; }

        /* --- TELA DE BRIEFING (PÁGINA COMPLETA AGORA) --- */
        .briefing-layout {
            display: flex; 
            gap: 60px;
            max-width: 1300px; 
            width: 100%;
            align-items: center; /* Centraliza verticalmente na tela */
            /* Removidos o fundo escuro, a borda e a sombra que davam aparência de pop-up */
        }

        .briefing-main-img {
            width: 500px; 
            height: 650px; /* Aumentei um pouco para ter mais presença na tela toda */
            background: #000; 
            border: 1px solid #333;
            object-fit: cover;
            filter: grayscale(0.3);
            box-shadow: 0 0 50px rgba(0,0,0,0.8); /* A sombra fica só na imagem agora */
        }

        .briefing-content {
            flex: 1; 
            display: flex; 
            flex-direction: column;
            justify-content: center;
            gap: 30px; /* Melhor distribuição do texto e botão na página */
        }

        .b-header { 
            border-bottom: 2px solid var(--blood); 
            padding-bottom: 15px; 
        }
        
        .b-title { 
            font-size: 4.5rem; /* Título um pouco maior para preencher a página */
            color: #fff; 
            margin: 0; 
            text-transform: uppercase; 
        }
        
        .b-desc { 
            font-family: 'Courier Prime'; 
            line-height: 1.8; 
            color: #aaa; 
            margin-top: 10px; 
            font-size: 1.2rem; 
        }

        .btn-start-game {
            background: #440000; color: #fff;
            border: 1px solid var(--bright-red);
            padding: 20px; font-size: 1.8rem;
            font-family: 'Special Elite'; cursor: pointer;
            transition: 0.3s;
            width: fit-content; /* O botão abraça o texto */
            margin-top: 20px;
        }

        .btn-start-game:hover { 
            background: var(--bright-red); 
            color: #000; 
            box-shadow: 0 0 30px var(--bright-red); 
        }

        /* --- BOTÃO DE VOLTAR UNIVERSAL --- */
        .back-nav {
            position: absolute; 
            top: 40px; 
            left: 40px;
            color: #444; 
            cursor: pointer; 
            font-size: 0.9rem;
            letter-spacing: 2px;
            transition: 0.3s;
            font-family: 'Courier Prime', monospace;
            z-index: 10;
        }

        .back-nav:hover { color: #fff; }

        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
            52% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="crt-lines"></div>
    <div class="vignette"></div>

    <section id="screen-title" class="screen">
        <h1 class="glitch-title">OFFLINE</h1>
        <div class="menu-options">
            <button class="btn-menu" onclick="nav('screen-chapters')">Acessar Banco de Dados</button>
            <button class="btn-menu">Arquivos de Log</button>
            <button class="btn-menu">Sair</button>
        </div>
    </section>

    <section id="screen-chapters" class="screen hidden">
        <div class="back-nav" onclick="nav('screen-title')">[ VOLTAR_AO_MENU ]</div>
        
        <h2 style="letter-spacing: 15px; color: #222; margin-bottom: 10px;">DATABASE_CHAPTERS</h2>
        
        <div class="chapter-grid">
            <div class="ch-card" onclick="openBriefing(1)">
                <img src="https://raw.githubusercontent.com/dontevenbothernothingishere/prototype/refs/heads/main/20260316_191612_0000.png" class="ch-img-preview">
                <div class="ch-label">CAPÍTULO 1</div>
            </div>

            <div class="ch-card locked" onclick="openBriefing(2)">
                <svg class="lock-svg" viewBox="0 0 24 24">
                    <path d="M18,8H17V6A5,5,0,0,0,7,6V8H6a2,2,0,0,0-2,2V20a2,2,0,0,0,2,2H18a2,2,0,0,0,2-2V10A2,2,0,0,0,18,8ZM9,6a3,3,0,0,1,6,0V8H9ZM18,20H6V10H18Z"/>
                </svg>
                <div class="ch-label">CAPÍTULO 2</div>
            </div>

            <div class="ch-card locked" onclick="openBriefing(3)">
                <svg class="lock-svg" viewBox="0 0 24 24">
                    <path d="M18,8H17V6A5,5,0,0,0,7,6V8H6a2,2,0,0,0-2,2V20a2,2,0,0,0,2,2H18a2,2,0,0,0,2-2V10A2,2,0,0,0,18,8ZM9,6a3,3,0,0,1,6,0V8H9ZM18,20H6V10H18Z"/>
                </svg>
                <div class="ch-label">CAPÍTULO 3</div>
            </div>

            <div class="ch-card locked" onclick="openBriefing(4)">
                <svg class="lock-svg" viewBox="0 0 24 24">
                    <path d="M18,8H17V6A5,5,0,0,0,7,6V8H6a2,2,0,0,0-2,2V20a2,2,0,0,0,2,2H18a2,2,0,0,0,2-2V10A2,2,0,0,0,18,8ZM9,6a3,3,0,0,1,6,0V8H9ZM18,20H6V10H18Z"/>
                </svg>
                <div class="ch-label">CAPÍTULO 4</div>
            </div>

            <div class="ch-card locked" onclick="openBriefing(5)">
                <svg class="lock-svg" viewBox="0 0 24 24">
                    <path d="M18,8H17V6A5,5,0,0,0,7,6V8H6a2,2,0,0,0-2,2V20a2,2,0,0,0,2,2H18a2,2,0,0,0,2-2V10A2,2,0,0,0,18,8ZM9,6a3,3,0,0,1,6,0V8H9ZM18,20H6V10H18Z"/>
                </svg>
                <div class="ch-label">CAPÍTULO 5</div>
            </div>
        </div>
    </section>

    <section id="screen-briefing" class="screen hidden">
        <div class="back-nav" onclick="nav('screen-chapters')">[ VOLTAR_AOS_ARQUIVOS ]</div>
        
        <div class="briefing-layout">
            <img id="b-img" src="" class="briefing-main-img">
            <div class="briefing-content">
                <div class="b-header">
                    <h2 id="b-title" class="b-title"></h2>
                </div>
                <p id="b-desc" class="b-desc"></p>
                <button class="btn-start-game" onclick="startGame()">CONECTAR AGORA</button>
            </div>
        </div>
    </section>

    <script>
        const chapterData = {
            1: {
                locked: false,
                title: "O Despertar",
                desc: "O sistema reiniciou, mas o prédio continua morto. Você ouve passos vindos da ventilação. Algo está tentando se comunicar através das telas de segurança.",
                img: "https://raw.githubusercontent.com/dontevenbothernothingishere/prototype/refs/heads/main/chapter1.jpg"
            },
            2: { locked: true },
            3: { locked: true },
            4: { locked: true },
            5: { locked: true }
        };

        // Função de Navegação Universal
        function nav(id) {
            // Efeito de "limpeza" de tela
            document.body.style.backgroundColor = "#111";
            
            setTimeout(() => {
                document.body.style.backgroundColor = "#030303";
                
                // Oculta todas as telas existentes
                const screens = document.querySelectorAll('.screen');
                screens.forEach(s => s.classList.add('hidden'));

                // Mostra apenas a tela com o ID solicitado
                const target = document.getElementById(id);
                if (target) {
                    target.classList.remove('hidden');
                }
            }, 100);
        }

        // Função para Abrir o Briefing do Capítulo
        function openBriefing(num) {
            const data = chapterData[num];
            
            // Se o capítulo estiver trancado, não faz nada
            if (data.locked) {
                console.log("Arquivo criptografado. Acesso negado.");
                return; 
            }

            // Injeta os dados do capítulo na tela de briefing
            document.getElementById('b-title').innerText = data.title;
            document.getElementById('b-desc').innerText = data.desc;
            document.getElementById('b-img').src = data.img;
            
            // Muda para a tela de briefing
            nav('screen-briefing');
        }

        function startGame() {
            // Efeito visual de entrada no jogo
            document.body.style.filter = "invert(1) contrast(2)";
            setTimeout(() => {
                alert("CONEXÃO ESTABELECIDA. BOA SORTE.");
                location.reload(); 
            }, 500);
        }

        // Inicialização: Garante que a tela de título seja a primeira (opcional, já está no HTML)
        window.onload = () => {
            console.log("Sistema OFFLINE carregado.");
        };
    </script>
</body>
</html>
